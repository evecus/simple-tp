name: Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            goos: linux
          - goarch: arm64
            goos: linux
          - goarch: mipsle
            goos: linux
            mips: softfloat
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOMIPS: ${{ matrix.mips }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o sprs-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.mips && format('-{0}', matrix.mips) || '' }} .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sprs-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.mips && format('-{0}', matrix.mips) || '' }}
          path: sprs-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.mips && format('-{0}', matrix.mips) || '' }}
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: SPRS v0.1.0
          files: |
            sprs-linux-amd64
            sprs-linux-arm64
            sprs-linux-mipsle-softfloat
